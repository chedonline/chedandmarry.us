<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ched and Marry — June 29, 2014</title>
<meta name="description" content="Charles &amp; Marry — June 29, 2014. Thank you for sharing the day with us.">
<meta name="robots" content="noindex, nofollow">

<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/cm.png">

<meta property="og:title" content="Ched and Marry — June 29, 2014">
<meta property="og:description" content="Thank you for sharing the day with us. Love, Ched and Marry">
<meta property="og:image" content="https://chedandmarry.us/images/og.jpg">
<meta property="og:url" content="https://chedandmarry.us/">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Merriweather+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --red: #dc1f2e;
  --teal: #0f3a40;
  --ink: #333;
  --muted: #999;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Merriweather', Georgia, serif;
  color: var(--ink);
  background: #fff;
  text-align: center;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; }
a { color: var(--teal); text-decoration: none; }
a:hover { color: var(--red); }

.wrapper {
  max-width: 860px;
  margin: 0 auto;
  padding: 48px 20px 60px;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade { opacity: 0; animation: fadeInUp 1s ease both; }
.fade.d1 { animation-delay: .15s; }
.fade.d2 { animation-delay: .4s; }
.fade.d3 { animation-delay: .65s; }
.fade.d4 { animation-delay: .9s; }
@media (prefers-reduced-motion: reduce) {
  .fade { animation: none; opacity: 1; }
}

header img.hero {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

.message { margin: 36px 0 48px; }
.message .thanks {
  font-weight: 700;
  font-size: clamp(18px, 4vw, 32px);
  line-height: 1.3;
  margin-bottom: 6px;
}
.message .love { font-size: 13px; font-style: italic; color: var(--muted); }

.section-title {
  margin: 56px 0 28px;
  height: 14px;
  border-bottom: 1px solid #ccc;
  overflow: visible;
}
.section-title span {
  display: inline-block;
  padding: 4px 12px;
  font-family: 'Merriweather Sans', Arial, sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #666;
  border: 1px solid #ccc;
  background: #fff;
}

.film video {
  display: block;
  width: 100%;
  border-radius: 4px;
  background: #000;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.film .alt {
  margin-top: 12px;
  font-size: 12px;
  color: var(--muted);
}
.film .alt a { border-bottom: 1px solid currentColor; }

.instagram p {
  max-width: 540px;
  margin: 0 auto 24px;
  font-size: 15px;
  line-height: 1.7;
}
.button {
  display: inline-block;
  padding: 14px 28px;
  font-family: 'Merriweather Sans', Arial, sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #fff;
  background: var(--red);
  border-radius: 3px;
  transition: background .2s ease;
}
.button:hover { background: var(--teal); color: #fff; }

footer {
  margin-top: 72px;
  font-family: 'Merriweather Sans', Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--muted);
}
footer img { display: block; width: 40px; margin: 0 auto 10px; opacity: .9; }
</style>
</head>

<body>
<div class="wrapper">

  <header class="fade d1">
    <img class="hero" src="images/ched-and-marry.png" alt="Charles Edward Yu Lim &#8734; Marry Cart Pik In — June 29, 2014">
  </header>

  <div class="message fade d2">
    <p class="thanks">Thank you for sharing the day with&nbsp;us.</p>
    <p class="love">Love, Ched and Marry</p>
  </div>

  <section class="film fade d3">
    <div class="section-title"><span>The Film</span></div>
    <video controls preload="metadata" poster="images/poster.jpg" playsinline>
      <source src="video/ched-and-marry-film.mp4" type="video/mp4">
      Your browser can’t play this video —
      <a href="https://vimeo.com/104893864">watch it on Vimeo</a>.
    </video>
    <p class="alt">Also on <a href="https://vimeo.com/104893864">Vimeo</a>.</p>
  </section>

  <section class="instagram fade d4">
    <div class="section-title"><span>#chedandmarry</span></div>
    <p>Everyone tagged their photos and videos with <strong>#chedandmarry</strong> —
    they’re still all there.</p>
    <a class="button" href="https://www.instagram.com/explore/tags/chedandmarry/">View on Instagram</a>
  </section>

  <footer class="fade d4">
    <img src="images/cm.png" alt="">
    Ched &#8734; Marry &middot; June 29, 2014 &mdash; Site by <a href="https://charleslim.net">charleslim.net</a>
  </footer>

</div>
</body>
</html>
